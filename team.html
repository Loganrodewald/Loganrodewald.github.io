---
layout: page
title: Current Members
subtitle: The Kinetix Lab
---

<section style="margin: var(--sp-xl) 0;">
    <div class="team-grid">
        
        {% for member in site.data.team %}
        <div class="member-node">
            <div class="polaroid" style="transform: rotate({{ member.rotation }});">
                <div class="photo-frame">
                    <img src="{{ member.image }}" alt="{{ member.name }}'s Photo" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div class="photo-label">{{ member.name }}</div>
            </div>
            
            <div class="sticky-note" style="--accent: {{ member.accent_color }}; --sticky-rot: {{ member.rotation }};">
                <div class="push-pin" style="--accent: {{ member.accent_color }};"></div>
                <span class="sticky-role">{{ member.role }}</span>
                {{ member.description }}
            </div>
        </div>
        {% endfor %}

    </div>
</section>
